<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="orbiit-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer orbit ring -->
  <circle cx="60" cy="60" r="50" stroke="url(#orbiit-grad)" stroke-width="3" fill="none" opacity="0.3"/>
  <!-- Inner orbit ring -->
  <circle cx="60" cy="60" r="35" stroke="url(#orbiit-grad)" stroke-width="2.5" fill="none" opacity="0.5"/>
  <!-- Core circle -->
  <circle cx="60" cy="60" r="18" fill="url(#orbiit-grad)"/>
  <!-- Orbiting dot 1 -->
  <circle cx="60" cy="10" r="5" fill="#2563EB"/>
  <!-- Orbiting dot 2 -->
  <circle cx="95" cy="60" r="4" fill="#60A5FA"/>
  <!-- Orbiting dot 3 -->
  <circle cx="35" cy="92" r="3.5" fill="#93C5FD"/>
</svg>
