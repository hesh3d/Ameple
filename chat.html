<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ameple — Chat</title>
  <meta name="description" content="Chat with your connections on Ameple.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
  <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
  <script src="js/toast.js"></script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/globe.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/calling.css">
</head>
<body>
  <div class="chat-layout">
    <!-- Left Sidebar -->
    <nav class="left-sidebar">
      <div class="sidebar-brand">
        <img src="assets/logo.svg" class="sidebar-logo" alt="Ameple" onerror="this.style.display='none'">
        <span class="brand-text">Ameple</span>
      </div>

      <!-- Navigation -->
      <div class="sidebar-nav">
        <a href="globe.html" class="sidebar-nav-item">
          <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg></span>
          <span class="nav-label">Globe</span>
        </a>
        <a href="chat.html" class="sidebar-nav-item active">
          <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg></span>
          <span class="nav-label">Messages</span>
          <span class="nav-badge" id="chat-nav-badge" style="display:none">0</span>
        </a>

        <a href="profile.html" class="sidebar-nav-item">
          <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></span>
          <span class="nav-label">Profile</span>
        </a>
        <a href="settings.html" class="sidebar-nav-item">
          <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></span>
          <span class="nav-label">Settings</span>
        </a>
      </div>

      <!-- Bottom: User Profile -->
      <div class="sidebar-bottom">
        <div class="sidebar-user" id="sidebar-user-trigger">
          <div class="sidebar-status-wrap">
            <img src="assets/default-avatar.svg" class="sidebar-avatar" id="sidebar-user-avatar" alt="You" onerror="this.src='assets/default-avatar.svg'">
            <div class="sidebar-status-dot" id="sidebar-status-dot"></div>
          </div>
          <div class="user-details">
            <span class="user-name">My Status</span>
            <span class="user-sub">Online</span>
          </div>
        </div>
      </div>
    </nav>

    <!-- Chat Sidebar (Conversations) -->
    <aside class="chat-sidebar">
      <div class="chat-sidebar-header">
        <h2 class="chat-sidebar-title">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
          Messages
        </h2>
        <div class="chat-search">
          <span class="chat-search-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#A0A0B0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></span>
          <input type="text" class="chat-search-input" id="chat-search" placeholder="Search conversations...">
        </div>
      </div>

      <!-- Tabs -->
      <div class="chat-tabs">
        <button class="chat-tab active" data-tab="chats">Messages</button>
        <button class="chat-tab" data-tab="requests">
          Requests
          <span class="tab-badge" id="requests-tab-badge" style="display:none">0</span>
        </button>
      </div>

      <!-- Conversation List -->
      <div class="conversation-list scroll-area" id="conversation-list">
        <!-- filled by JS -->
      </div>

      <!-- Requests List -->
      <div class="conversation-list scroll-area" id="requests-list" style="display:none">
        <!-- filled by JS -->
      </div>
    </aside>

    <!-- Chat Window -->
    <div class="chat-window" id="chat-window">
      <!-- Empty State -->
      <div class="chat-empty" id="chat-empty">
        <div class="chat-empty-icon"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg></div>
        <div class="chat-empty-text">Select a conversation</div>
        <div class="chat-empty-hint">Choose from your connections or respond to a request</div>
      </div>

      <!-- Active Chat (hidden by default) -->
      <div id="active-chat" style="display:none; flex-direction:column; height:100%;">
        <div class="chat-header" id="chat-header">
          <img src="assets/default-avatar.svg" class="chat-header-avatar" id="chat-header-avatar" alt="User">
          <div class="chat-header-info">
            <div class="chat-header-name" id="chat-header-name">User Name</div>
            <div class="chat-header-status" id="chat-header-status">Offline</div>
          </div>
          <div class="chat-header-actions">
            <button class="chat-action-btn custom-icon" title="Audio Call">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            </button>
            <button class="chat-action-btn custom-icon" title="Video Call">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="3" ry="3"></rect></svg>
            </button>
            <button class="chat-action-btn custom-icon" id="btn-view-profile" title="View Profile">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="14"></line><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
            </button>
          </div>
        </div>

        <div class="chat-messages scroll-area" id="chat-messages">
          <!-- Messages filled by JS -->
        </div>

        <div class="chat-input-bar">
          <div class="emoji-picker-container" id="emoji-picker-container">
            <!-- Emoji Mart injected by JS here -->
          </div>
          <button class="chat-emoji-btn" id="btn-toggle-emoji">😊</button>
          <div class="chat-input-wrapper">
            <div class="chat-input" id="chat-input" contenteditable="true" data-placeholder="Type a message..."></div>
            <div class="char-counter" id="char-counter">0 / 500</div>
          </div>
          <button class="chat-send-btn" id="btn-send-message">➤</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Status Dropdown -->
  <div class="status-dropdown" id="status-dropdown">
    <div class="status-dropdown-title">SET YOUR STATUS</div>
    <div id="status-options"></div>
    <div class="status-custom">
      <input type="text" class="status-custom-input" id="custom-status-input" placeholder="Custom status..." maxlength="50">
      <button class="btn btn-primary btn-sm" id="btn-save-custom-status">Save</button>
    </div>
  </div>

  <!-- Calling Overlay (Neobrutalist Lux Style) -->
  <div class="calling-overlay" id="calling-overlay">
    <div class="calling-container">
      <div class="calling-view-primary">
        <span class="calling-status-text">Calling...</span>
        <img src="assets/default-avatar.svg" class="calling-remote-avatar ringing" id="calling-avatar" alt="Calling">

        <!-- Local Video PiP -->
        <div class="calling-view-secondary" id="calling-local-view" style="display:none;" title="Click to resize">
          <div class="calling-local-video">
            <video id="local-video-feed" autoplay muted playsinline style="width:100%; height:100%; object-fit:cover;"></video>
            <div id="local-video-placeholder" style="position:absolute; inset:0; background:#374151; display:flex; align-items:center; justify-content:center;">
              <span style="color:#FFF; font-size:10px; font-weight:800;">YOU</span>
            </div>
          </div>
        </div>

      </div>

      <div class="calling-controls">
        <button class="control-btn" id="btn-call-mic" title="Mic">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
        </button>
        <button class="control-btn" id="btn-call-video" title="Video">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="3" ry="3"></rect></svg>
        </button>
        <button class="control-btn" id="btn-call-volume" title="Volume">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
        </button>
        <button class="control-btn btn-hangup" id="btn-call-hangup" title="Hangup">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"></path></svg>
        </button>
      </div>

      <div class="calling-info">
        <div class="calling-user-name" id="calling-user-name">User Name</div>
        <div class="calling-timer" id="calling-timer">Establishing connection...</div>
      </div>
    </div>
  </div>

  <!-- Right Panel (Profile / Filters) -->
  <div class="right-panel" id="right-panel">
    <div class="right-panel-header">
      <span class="right-panel-title" id="right-panel-title">Profile</span>
      <button class="right-panel-close" id="btn-close-right">✕</button>
    </div>
    <div class="right-panel-body scroll-area" id="right-panel-body">
      <!-- Profile injected here -->
    </div>
  </div>

  <script src="js/lib/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/lib/emoji.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
