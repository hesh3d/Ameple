<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbiit — Settings</title>
  <meta name="description" content="Manage your Orbiit account settings.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
  <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/globe.css">
  <link rel="stylesheet" href="css/profile.css">
  <style>
    .settings-main {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
    }
    .settings-container {
      max-width: 600px;
      margin: 0 auto;
    }
    .settings-title {
      font-family: var(--font-display);
      font-size: 28px;
      margin-bottom: 32px;
    }
    .settings-section {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-light);
      padding: 24px;
      margin-bottom: 16px;
    }
    .settings-section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row-label {
      font-size: 14px;
      color: var(--text-primary);
    }
    .settings-row-value {
      font-size: 14px;
      color: var(--text-secondary);
    }
    .danger-zone {
      border-color: rgba(239, 68, 68, 0.2);
    }
    .btn-danger {
      background: var(--error);
      color: #FFFDEB;
    }
    .btn-danger:hover {
      background: #DC2626;
    }
  </style>
</head>
<body>
  <div class="profile-layout">
    <!-- Left Sidebar -->
    <nav class="left-sidebar">
      <img src="assets/logo.svg" class="sidebar-logo" alt="Orbiit" onerror="this.style.display='none'">
      <div class="sidebar-status"><div class="sidebar-status-dot"></div></div>
      <div class="sidebar-nav">
        <a href="globe.html" class="sidebar-nav-item" title="Globe">🌍</a>
        <a href="chat.html" class="sidebar-nav-item" title="Chats">💬</a>
        <a href="#" class="sidebar-nav-item" title="Requests">🔔</a>
        <a href="profile.html" class="sidebar-nav-item" title="Profile">👤</a>
        <a href="settings.html" class="sidebar-nav-item active" title="Settings">⚙️</a>
      </div>
      <div class="sidebar-bottom">
        <img src="assets/default-avatar.svg" class="sidebar-avatar" id="sidebar-user-avatar" alt="You">
      </div>
    </nav>

    <!-- Main Content -->
    <main class="settings-main">
      <div class="settings-container">
        <h1 class="settings-title">⚙️ Settings</h1>

        <div class="settings-section">
          <div class="settings-section-title">👤 Account</div>
          <div class="settings-row">
            <span class="settings-row-label">Email</span>
            <span class="settings-row-value" id="settings-email">—</span>
          </div>
          <div class="settings-row">
            <span class="settings-row-label">Name</span>
            <span class="settings-row-value" id="settings-name">—</span>
          </div>
          <div class="settings-row">
            <span class="settings-row-label">Country</span>
            <span class="settings-row-value" id="settings-country">—</span>
          </div>
          <div class="settings-row">
            <span class="settings-row-label">Member since</span>
            <span class="settings-row-value" id="settings-joined">—</span>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-section-title">🔒 Privacy</div>
          <div class="settings-row">
            <span class="settings-row-label">Show online status</span>
            <div class="toggle active" id="toggle-online"></div>
          </div>
          <div class="settings-row">
            <span class="settings-row-label">Show on globe</span>
            <div class="toggle active" id="toggle-globe"></div>
          </div>
        </div>

        <div class="settings-section danger-zone">
          <div class="settings-section-title" style="color:var(--error);">⚠️ Danger Zone</div>
          <div class="settings-row">
            <span class="settings-row-label">Sign out of your account</span>
            <button class="btn btn-danger btn-sm" id="btn-signout">Sign Out</button>
          </div>
          <div class="settings-row">
            <span class="settings-row-label">Clear all local data</span>
            <button class="btn btn-secondary btn-sm" id="btn-clear-data">Clear Data</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/lib/supabase.js"></script>
  <script src="js/auth.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
      var notyf = new Notyf({ duration: 3000, position: { x: 'right', y: 'top' } });
      var user = window.OrbiitAuth.getCurrentUser();

      if (user) {
        document.getElementById('settings-email').textContent = user.email || '—';
        document.getElementById('settings-name').textContent = (user.first_name || '') + ' ' + (user.last_name || '');
        document.getElementById('settings-country').textContent = (user.flag || '') + ' ' + (user.country || '—');
        document.getElementById('settings-joined').textContent = user.created_at
          ? new Date(user.created_at).toLocaleDateString() : '—';

        var avatar = document.getElementById('sidebar-user-avatar');
        if (avatar && user.avatar_url) avatar.src = user.avatar_url;
      }

      // Toggles
      document.querySelectorAll('.toggle').forEach(function(toggle) {
        toggle.addEventListener('click', function() {
          this.classList.toggle('active');
          notyf.success('Setting updated');
        });
      });

      // Sign out
      document.getElementById('btn-signout').addEventListener('click', function() {
        if (confirm('Are you sure you want to sign out?')) {
          window.OrbiitAuth.signOut();
        }
      });

      // Clear data
      document.getElementById('btn-clear-data').addEventListener('click', function() {
        if (confirm('This will delete all local data including messages. Are you sure?')) {
          localStorage.clear();
          notyf.success('All data cleared');
          setTimeout(function() { window.location.href = 'index.html'; }, 1000);
        }
      });
    });
  </script>
  <script src="js/lib/emoji.js"></script>
</body>
</html>
