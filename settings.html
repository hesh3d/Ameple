<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ameple — Settings</title>
  <meta name="description" content="Manage your Ameple account settings.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
  <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
  <script src="js/toast.js"></script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/globe.css">
  <link rel="stylesheet" href="css/profile.css">
  <style>
    .settings-main {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      background: #FFFBF0;
    }
    .settings-container {
      max-width: 650px;
      margin: 0 auto;
    }
    .settings-title {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 950;
      margin-bottom: 40px;
      color: #1A1A2E;
      letter-spacing: -0.04em;
    }
    .settings-section {
      background: #FFFFFF;
      border-radius: 24px;
      border: 3px solid #1A1A2E;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: 8px 8px 0px rgba(26, 26, 46, 0.05);
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .settings-section:hover {
      transform: translateY(-2px);
    }
    .settings-section-title {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 900;
      color: #1A1A2E;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 2px dashed #E5E7EB;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row-label {
      font-size: 15px;
      font-weight: 700;
      color: #374151;
    }
    .settings-row-value {
      font-size: 14px;
      font-weight: 800;
      color: #1A1A2E;
      background: #FFFFFF;
      padding: 6px 14px;
      border-radius: 12px;
      border: 2.5px solid #1A1A2E;
      box-shadow: 2px 2px 0px rgba(0,0,0,0.05);
    }
    .danger-zone {
      border-color: #EF4444;
      background: #FFF;
      box-shadow: 8px 8px 0px rgba(239, 68, 68, 0.1);
    }
    .btn-danger {
      background: #EF4444 !important;
      color: #FFF !important;
      border: 3px solid #1A1A2E !important;
      box-shadow: 4px 4px 0px #1A1A2E !important;
      font-weight: 900 !important;
      border-radius: 14px !important;
      padding: 10px 20px !important;
      transition: all 0.15s ease-out !important;
    }
    .btn-danger:hover {
      transform: translateY(2px) translateX(2px);
      box-shadow: 0px 0px 0px #1A1A2E !important;
    }
    #btn-clear-data {
      background: #FFF !important;
      border: 3px solid #1A1A2E !important;
      box-shadow: 4px 4px 0px #1A1A2E !important;
      font-weight: 900 !important;
      border-radius: 14px !important;
      padding: 10px 20px !important;
      transition: all 0.15s ease-out !important;
    }
    #btn-clear-data:hover {
      transform: translateY(2px) translateX(2px);
      box-shadow: 0px 0px 0px #1A1A2E !important;
    }

    /* Cartoon Neobrutalist Toggle - Fixed Alignment */
    .toggle {
      width: 56px;
      height: 30px;
      background: #E5E7EB;
      border: 3px solid #1A1A2E;
      border-radius: 20px;
      position: relative;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 2px 2px 0px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      padding: 0 4px; /* Ensure space from edges */
    }
    .toggle::after {
      content: '';
      width: 18px;
      height: 18px;
      background: #FFFFFF;
      border: 2.5px solid #1A1A2E;
      border-radius: 50%;
      transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      flex-shrink: 0;
    }
    .toggle.active {
      background: #10B981;
      border-color: #1A1A2E;
    }
    .toggle.active::after {
      transform: translateX(24px);
    }
  </style>
</head>
<body>
  <div class="profile-layout">
    <!-- Left Sidebar -->
    <nav class="left-sidebar">
      <div class="sidebar-brand">
        <img src="assets/logo.svg" class="sidebar-logo" alt="Ameple" onerror="this.style.display='none'">
        <span class="brand-text">Ameple</span>
      </div>

      <!-- Navigation -->
      <div class="sidebar-nav">
        <a href="globe.html" class="sidebar-nav-item">
          <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg></span>
          <span class="nav-label">Globe</span>
        </a>
        <a href="chat.html" class="sidebar-nav-item">
          <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg></span>
          <span class="nav-label">Messages</span>
          <span class="nav-badge" id="chat-nav-badge" style="display:none">0</span>
        </a>

        <a href="profile.html" class="sidebar-nav-item">
          <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></span>
          <span class="nav-label">Profile</span>
        </a>
        <a href="settings.html" class="sidebar-nav-item active">
          <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></span>
          <span class="nav-label">Settings</span>
        </a>
      </div>

      <!-- Bottom: User Profile -->
      <div class="sidebar-bottom">
        <div class="sidebar-user" id="sidebar-user-trigger">
          <div class="sidebar-status-wrap">
            <img src="assets/default-avatar.svg" class="sidebar-avatar" id="sidebar-user-avatar" alt="You" onerror="this.src='assets/default-avatar.svg'">
            <div class="sidebar-status-dot" id="sidebar-status-dot"></div>
          </div>
          <div class="user-details">
            <span class="user-name">My Status</span>
            <span class="user-sub">Online</span>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="settings-main">
      <div class="settings-container">
        <h1 class="settings-title">⚙️ Settings</h1>

        <div class="settings-section">
          <div class="settings-section-title">👤 Account</div>
          <div class="settings-row">
            <span class="settings-row-label">Email</span>
            <span class="settings-row-value" id="settings-email">—</span>
          </div>
          <div class="settings-row">
            <span class="settings-row-label">Name</span>
            <span class="settings-row-value" id="settings-name">—</span>
          </div>
          <div class="settings-row">
            <span class="settings-row-label">Country</span>
            <span class="settings-row-value" id="settings-country">—</span>
          </div>
          <div class="settings-row">
            <span class="settings-row-label">Member since</span>
            <span class="settings-row-value" id="settings-joined">—</span>
          </div>
        </div>



        <div class="settings-section danger-zone">
          <div class="settings-section-title" style="color:var(--error);">⚠️ Danger Zone</div>
          <div class="settings-row">
            <span class="settings-row-label">Sign out of your account</span>
            <button class="btn btn-danger btn-sm" id="btn-signout">Sign Out</button>
          </div>
          <div class="settings-row">
            <span class="settings-row-label">Clear all local data</span>
            <button class="btn btn-secondary btn-sm" id="btn-clear-data">Clear Data</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/lib/supabase.js"></script>
  <script src="js/auth.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async function() {
      var notyf = new Notyf({ duration: 3000, position: { x: 'right', y: 'top' } });

      function renderSettings(user) {
        if (!user) return;
        document.getElementById('settings-email').textContent = user.email || '—';
        document.getElementById('settings-name').textContent = (user.first_name || '') + ' ' + (user.last_name || '');
        document.getElementById('settings-country').textContent = (user.flag || '') + ' ' + (user.country || '—');
        document.getElementById('settings-joined').textContent = user.created_at
          ? new Date(user.created_at).toLocaleDateString() : '—';

        var avatar = document.getElementById('sidebar-user-avatar');
        if (avatar && user.avatar_url) avatar.src = user.avatar_url;
      }

      // Render from cache first
      var user = window.AmepleAuth.getCurrentUser();
      renderSettings(user);

      // Then refresh from Supabase
      try {
        var freshUser = await window.AmepleAuth.fetchCurrentUser();
        if (freshUser) renderSettings(freshUser);
      } catch (e) {
        console.warn('Settings: failed to refresh user:', e);
      }

      // Toggles
      document.querySelectorAll('.toggle').forEach(function(toggle) {
        toggle.addEventListener('click', function() {
          this.classList.toggle('active');
          notyf.success('Setting updated');
        });
      });

      // Sign out
      document.getElementById('btn-signout').addEventListener('click', function() {
        if (confirm('Are you sure you want to sign out?')) {
          window.AmepleAuth.signOut();
        }
      });

      // Clear data
      document.getElementById('btn-clear-data').addEventListener('click', function() {
        if (confirm('This will delete all local data including messages. Are you sure?')) {
          localStorage.clear();
          notyf.success('All data cleared');
          setTimeout(function() { window.location.href = 'index.html'; }, 1000);
        }
      });
    });
  </script>
  <!-- Status Dropdown -->
  <div class="status-dropdown" id="status-dropdown">
    <div class="status-dropdown-title">SET YOUR STATUS</div>
    <div id="status-options"></div>
    <div class="status-custom">
      <input type="text" class="status-custom-input" id="custom-status-input" placeholder="Custom status..." maxlength="50">
      <button class="btn btn-primary btn-sm" id="btn-save-custom-status">Save</button>
    </div>
  </div>

  <script src="js/sidebar.js"></script>
  <script src="js/lib/emoji.js"></script>
</body>
</html>
