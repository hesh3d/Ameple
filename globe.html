<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbiit — Explore the Globe</title>
  <meta name="description" content="Explore professionals worldwide on Orbiit's interactive 3D globe. Connect with creatives, developers, and thinkers.">

  <!-- Notyf -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
  <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>

  <!-- Tom Select (for filter dropdowns) -->
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

  <!-- Globe.gl -->
  <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.30.0/dist/globe.gl.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/globe.css">
</head>
<body>
  <div class="globe-layout">

    <!-- Left Sidebar -->
    <nav class="left-sidebar">
      <img src="assets/logo.svg" class="sidebar-logo" alt="Orbiit" onerror="this.style.display='none'">

      <!-- Status Indicator -->
      <div class="sidebar-status" id="sidebar-status">
        <div class="sidebar-status-dot"></div>
      </div>

      <!-- Navigation -->
      <div class="sidebar-nav">
        <a href="globe.html" class="sidebar-nav-item active" title="Globe">🌍</a>
        <a href="chat.html" class="sidebar-nav-item" title="Chats">💬</a>
        <a href="#" class="sidebar-nav-item" title="Requests" id="nav-requests">
          🔔
          <span class="nav-badge" id="requests-badge" style="display:none">0</span>
        </a>
        <a href="profile.html" class="sidebar-nav-item" title="Profile">👤</a>
        <a href="settings.html" class="sidebar-nav-item" title="Settings">⚙️</a>
      </div>

      <!-- Bottom: User Avatar -->
      <div class="sidebar-bottom">
        <img src="assets/default-avatar.svg" class="sidebar-avatar" id="sidebar-user-avatar" alt="You"
             onerror="this.src='assets/default-avatar.svg'">
      </div>
    </nav>

    <!-- Globe Area Wrapper -->
    <div class="globe-area">
      <!-- Globe WebGL Target -->
      <div id="globe-container"></div>

      <!-- Overlay UI (sits on top of globe canvas) -->
      <div class="globe-overlay">
        <!-- Search Bar -->
        <div class="globe-search">
          <span class="globe-search-icon">🔍</span>
          <input type="text" class="globe-search-input" id="globe-search-input"
                 placeholder="Search people by name, skill, or country...">
        </div>

        <!-- Filter Toggle -->
        <button class="filter-toggle" id="filter-toggle">⚙️ Filters</button>

        <!-- Legend -->
        <div class="globe-legend" id="globe-legend"></div>

        <!-- User Count -->
        <div class="globe-user-count" id="user-count">
          <span class="count-num">0</span> people on the globe
        </div>
      </div>
    </div>

    <!-- Right Panel (Profile / Filters) -->
    <div class="right-panel" id="right-panel">
      <div class="right-panel-header">
        <span class="right-panel-title" id="right-panel-title">Profile</span>
        <button class="right-panel-close">✕</button>
      </div>
      <div class="right-panel-body scroll-area" id="right-panel-body"></div>
    </div>

    <!-- Status Dropdown -->
    <div class="status-dropdown" id="status-dropdown">
      <div class="status-dropdown-title">SET YOUR STATUS</div>
      <div id="status-options"></div>
      <div class="status-custom">
        <input type="text" class="status-custom-input" id="custom-status-input" placeholder="Custom status..." maxlength="50">
        <button class="btn btn-primary btn-sm" id="btn-save-custom-status">Save</button>
      </div>
    </div>

    <!-- Ice Breaker Modal -->
    <div class="modal-overlay" id="icebreaker-modal">
      <div class="modal">
        <div class="modal-header">
          <h3>👋 Say Hello to <span class="modal-user-name"></span></h3>
          <button class="modal-close">✕</button>
        </div>
        <p style="font-size:14px; color:var(--text-secondary); margin-bottom:16px;">
          Send a friendly ice-breaker message. Be genuine and specific about why you want to connect.
        </p>
        <textarea class="icebreaker-textarea" placeholder="Hi! I noticed we share similar interests in..." maxlength="300"></textarea>
        <div class="icebreaker-counter">0/300</div>
        <button class="btn btn-primary w-full btn-send-icebreaker" style="margin-top:16px;">Send Message 🚀</button>
      </div>
    </div>

  </div>

  <!-- Scripts -->
  <script src="js/data/jobs.js"></script>
  <script src="js/data/skills.js"></script>
  <script src="js/data/hobbies.js"></script>
  <script src="js/data/languages.js"></script>
  <script src="js/data/sampleUsers.js"></script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/auth.js"></script>
    <script src="js/lib/emoji.js"></script>
  <script src="js/globe.js"></script>
</body>
</html>
