<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbiit — My Profile</title>
  <meta name="description" content="View and edit your Orbiit profile.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
  <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/globe.css">
  <link rel="stylesheet" href="css/profile.css">
</head>
<body>
  <div class="profile-layout">
    <!-- Left Sidebar (reused) -->
    <nav class="left-sidebar">
      <img src="assets/logo.svg" class="sidebar-logo" alt="Orbiit" onerror="this.style.display='none'">
      <div class="sidebar-status" id="sidebar-status">
        <div class="sidebar-status-dot"></div>
      </div>
      <div class="sidebar-nav">
        <a href="globe.html" class="sidebar-nav-item" title="Globe">🌍</a>
        <a href="chat.html" class="sidebar-nav-item" title="Chats">💬</a>
        <a href="#" class="sidebar-nav-item" title="Requests">🔔</a>
        <a href="profile.html" class="sidebar-nav-item active" title="Profile">👤</a>
        <a href="settings.html" class="sidebar-nav-item" title="Settings">⚙️</a>
      </div>
      <div class="sidebar-bottom">
        <img src="assets/default-avatar.svg" class="sidebar-avatar" id="sidebar-user-avatar" alt="You">
      </div>
    </nav>

    <!-- Main Content -->
    <main class="profile-main">
      <div class="profile-container" id="profile-container">
        <!-- Filled by JS -->
        <div class="chat-empty" id="profile-loading">
          <div class="chat-empty-icon">👤</div>
          <div class="chat-empty-text">Loading profile...</div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/data/jobs.js"></script>
  <script src="js/data/skills.js"></script>
  <script src="js/data/hobbies.js"></script>
  <script src="js/data/languages.js"></script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/auth.js"></script>
    <script src="js/lib/emoji.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
